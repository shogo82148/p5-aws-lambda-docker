name: Build build-5.42-paws.al2023 image

on:
  push:
    branches:
      - main
    tags:
      - "5.42-build-paws.al2023/*"
  pull_request:
    paths:
      - ".github/workflows/5.42-build-paws.al2023.yml"
      - "dockerfiles/5.42/build-paws.al2023/**"
  workflow_dispatch:

permissions:
  id-token: write
  contents: write
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: shogo82148/actions-setup-perl@3d3cb73ca65d657a809d97eab324d4e4f140bf5e # v1.42.0
        with:
          perl-version: "5.44"
      - name: build
        run: ./scripts/build.pl 5.42 build-paws.al2023

      - name: Publish to DockerHub
        env:
          USERNAME: ${{ vars.DOCKERHUB_USERNAME }}
          PASSWORD: ${{ secrets.DOCKERHUB_PASSWORD }}
        run: |
          printenv PASSWORD | docker login --username "$USERNAME" --password-stdin
          ./scripts/publish.pl "$USERNAME/p5-aws-lambda" 5.42 build-paws.al2023 build-5.42-paws.al2023
          docker logout

      - name: Publish to GitHub Packages Container registry
        env:
          USERNAME: ${{ github.repository_owner }}
          PASSWORD: ${{ secrets.GITHUB_TOKEN }}
        run: |
          printenv PASSWORD | docker login --username "$USERNAME" --password-stdin ghcr.io
          ./scripts/publish.pl "ghcr.io/$USERNAME/p5-aws-lambda" 5.42 build-paws.al2023 build-5.42-paws.al2023
          docker logout ghcr.io

      - name: Configure AWS Credentials
        uses: fuller-inc/actions-aws-assume-role@c6cc1f39a57c0228a4b542ae2b3d49d3e56ce85a # v1.9.1
        with:
          aws-region: us-east-1
          role-to-assume: arn:aws:iam::445285296882:role/lambda-perl5-runtime-ecr-DeploymentRole-199JZ5SP862Q0
          role-session-tagging: true
      - name: Publish to ECR Public Registry
        run: |
          aws ecr-public get-login-password --region us-east-1 | docker login --username AWS --password-stdin public.ecr.aws/shogo82148
          ./scripts/publish.pl "public.ecr.aws/shogo82148/p5-aws-lambda" 5.42 build-paws.al2023 build-5.42-paws.al2023
          docker logout public.ecr.aws/shogo82148
