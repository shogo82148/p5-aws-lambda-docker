name: Build build-5.40-paws.al2023 image

on:
  push:
    branches:
      - main
    tags:
      - "5.40-build-paws.al2023/*"
  pull_request:
    paths:
      - ".github/workflows/5.40-build-paws.al2023.yml"
      - "dockerfiles/5.40/build-paws.al2023/**"
  workflow_dispatch:

permissions:
  id-token: write
  contents: write
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3.7.0
      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: shogo82148/actions-setup-perl@5a2f3b681f2e2fa0db6cc52c7608d9916527aa58 # v1.40.0
        with:
          perl-version: "5.42"
      - name: build
        run: ./scripts/build.pl 5.40 build-paws.al2023

      - name: Publish to DockerHub
        env:
          USERNAME: ${{ vars.DOCKERHUB_USERNAME }}
          PASSWORD: ${{ secrets.DOCKERHUB_PASSWORD }}
        run: |
          printenv PASSWORD | docker login --username "$USERNAME" --password-stdin
          ./scripts/publish.pl "$USERNAME/p5-aws-lambda" 5.40 build-paws.al2023 build-5.40-paws.al2023
          docker logout

      - name: Publish to GitHub Packages Container registry
        env:
          USERNAME: ${{ github.repository_owner }}
          PASSWORD: ${{ secrets.GITHUB_TOKEN }}
        run: |
          printenv PASSWORD | docker login --username "$USERNAME" --password-stdin ghcr.io
          ./scripts/publish.pl "ghcr.io/$USERNAME/p5-aws-lambda" 5.40 build-paws.al2023 build-5.40-paws.al2023
          docker logout ghcr.io

      - name: Configure AWS Credentials
        uses: fuller-inc/actions-aws-assume-role@19da35d1a3ac5e2fa44b6052f811d5e95195088b # v1.9.0
        with:
          aws-region: us-east-1
          role-to-assume: arn:aws:iam::445285296882:role/lambda-perl5-runtime-ecr-DeploymentRole-199JZ5SP862Q0
          role-session-tagging: true
      - name: Publish to ECR Public Registry
        run: |
          aws ecr-public get-login-password --region us-east-1 | docker login --username AWS --password-stdin public.ecr.aws/shogo82148
          ./scripts/publish.pl "public.ecr.aws/shogo82148/p5-aws-lambda" 5.40 build-paws.al2023 build-5.40-paws.al2023
          docker logout public.ecr.aws/shogo82148
